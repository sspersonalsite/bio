<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #111; display: flex; gap: 32px; padding: 40px; flex-wrap: wrap; font-family: sans-serif; align-items: flex-start; }
  .opt { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .opt span { color: #aaa; font-size: 13px; }
</style>
</head>
<body>

<!-- 1: Bold S monogram -->
<div class="opt">
  <svg width="120" height="120" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <rect width="64" height="64" rx="12" fill="#0d1117"/>
    <text x="32" y="46" font-family="Arial Black,sans-serif" font-size="44" font-weight="900" fill="#4A9EDB" text-anchor="middle">S</text>
  </svg>
  <span>1 — Bold monogram</span>
</div>

<!-- 2: Hexagon -->
<div class="opt">
  <svg width="120" height="120" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <rect width="64" height="64" rx="12" fill="#0d1117"/>
    <polygon points="32,8 54,20 54,44 32,56 10,44 10,20" fill="none" stroke="#4A9EDB" stroke-width="3"/>
    <polygon points="32,16 46,24 46,40 32,48 18,40 18,24" fill="#4A9EDB" opacity="0.2"/>
  </svg>
  <span>2 — Hexagon</span>
</div>

<!-- 3: Orbital/atom -->
<div class="opt">
  <svg width="120" height="120" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <rect width="64" height="64" rx="12" fill="#0d1117"/>
    <ellipse cx="32" cy="32" rx="22" ry="9" fill="none" stroke="#4A9EDB" stroke-width="2" opacity="0.7"/>
    <ellipse cx="32" cy="32" rx="22" ry="9" fill="none" stroke="#4A9EDB" stroke-width="2" opacity="0.7" transform="rotate(60 32 32)"/>
    <ellipse cx="32" cy="32" rx="22" ry="9" fill="none" stroke="#4A9EDB" stroke-width="2" opacity="0.7" transform="rotate(120 32 32)"/>
    <circle cx="32" cy="32" r="4" fill="#90d0ff"/>
  </svg>
  <span>3 — Atom/orbital</span>
</div>

<!-- 4: Minimal ring pulse -->
<div class="opt">
  <svg width="120" height="120" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <rect width="64" height="64" rx="12" fill="#0d1117"/>
    <circle cx="32" cy="32" r="24" fill="none" stroke="#4A9EDB" stroke-width="1.5" opacity="0.3"/>
    <circle cx="32" cy="32" r="17" fill="none" stroke="#4A9EDB" stroke-width="1.5" opacity="0.5"/>
    <circle cx="32" cy="32" r="10" fill="none" stroke="#90d0ff" stroke-width="2" opacity="0.8"/>
    <circle cx="32" cy="32" r="4" fill="#cce8ff"/>
  </svg>
  <span>4 — Concentric rings</span>
</div>

<!-- 5: Lightning / signal bolt -->
<div class="opt">
  <svg width="120" height="120" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <rect width="64" height="64" rx="12" fill="#0d1117"/>
    <polygon points="36,8 20,34 30,34 28,56 44,30 34,30" fill="#4A9EDB"/>
    <polygon points="36,8 20,34 30,34 28,56 44,30 34,30" fill="#90d0ff" opacity="0.4"/>
  </svg>
  <span>5 — Bolt/signal</span>
</div>

</body>
</html>
