<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0e0c0a;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 40px;
}

.world-line {
  stroke-dasharray: 12000;
  stroke-dashoffset: 12000;
  animation: draw 6s cubic-bezier(0.4,0,0.2,1) 0.4s forwards;
}

@keyframes draw {
  to { stroke-dashoffset: 0; }
}

.dot {
  opacity: 0;
  animation: popin 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
.dot:nth-child(2) { animation-delay: 6.2s; }
.dot:nth-child(3) { animation-delay: 6.5s; }
.dot:nth-child(4) { animation-delay: 6.8s; }
.dot:nth-child(5) { animation-delay: 7.1s; }
.dot:nth-child(6) { animation-delay: 7.4s; }

.dot-ring {
  opacity: 0;
  animation: ringpulse 1.5s ease-out forwards;
}
.dot-ring:nth-child(2) { animation-delay: 6.2s; }
.dot-ring:nth-child(3) { animation-delay: 6.5s; }
.dot-ring:nth-child(4) { animation-delay: 6.8s; }
.dot-ring:nth-child(5) { animation-delay: 7.1s; }
.dot-ring:nth-child(6) { animation-delay: 7.4s; }

@keyframes popin {
  0%   { opacity: 0; r: 0; }
  60%  { opacity: 1; r: 7; }
  80%  { r: 4; }
  100% { opacity: 1; r: 5; }
}
@keyframes ringpulse {
  0%   { opacity: 0.7; r: 5; }
  100% { opacity: 0; r: 22; }
}
</style>
</head>
<body>
<svg viewBox="0 0 1000 520" style="width:100%;max-width:1000px" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="lineglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dotglow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!--
    One-line world map
    Coordinate system: x=(lon+180)/360*1000, y=(80-lat)/140*520
    Drawing order: N America → S America → Africa → Europe → Asia → Australia
    Connecting lines between continents are intentional (one-line aesthetic)
  -->
  <path class="world-line"
    fill="none"
    stroke="rgba(220,212,200,0.5)"
    stroke-width="1.3"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#lineglow)"
    d="
      M 75,37
      L 340,57 L 308,186 L 280,203 L 260,228 L 268,264

      L 278,268 L 405,315 L 388,400 L 318,497 L 298,458 L 278,322 L 278,268

      L 405,315 L 486,163
      L 604,186 L 644,255 L 554,423 L 514,354 L 452,249 L 486,163

      L 474,152 L 464,93 L 578,33 L 582,60 L 587,130 L 566,164 L 474,152

      L 582,145 L 772,31 L 958,64 L 890,164 L 800,237 L 712,268 L 650,178 L 582,145

      L 800,237 L 818,376
      L 903,349 L 912,436 L 878,430 L 818,411 L 818,376
    "
  />

  <!--
    Work location dots + pulsing rings
    1: San Francisco (Cruise + Soqono)
    2: London (EMEIA)
    3: Dubai (EMEIA)
    4: Tokyo (APAC)
    5: Singapore (APAC)
  -->

  <!-- San Francisco: lon=-122.4, lat=37.8 -->
  <circle class="dot-ring" cx="161" cy="157" r="5" fill="none" stroke="#4A9EDB" stroke-width="1.2"/>
  <circle class="dot" cx="161" cy="157" r="5" fill="#4A9EDB" filter="url(#dotglow)"/>

  <!-- London: lon=-0.1, lat=51.5 -->
  <circle class="dot-ring" cx="500" cy="105" r="5" fill="none" stroke="#4A9EDB" stroke-width="1.2"/>
  <circle class="dot" cx="500" cy="105" r="5" fill="#4A9EDB" filter="url(#dotglow)"/>

  <!-- Dubai: lon=55.3, lat=25.2 -->
  <circle class="dot-ring" cx="654" cy="203" r="5" fill="none" stroke="#4A9EDB" stroke-width="1.2"/>
  <circle class="dot" cx="654" cy="203" r="5" fill="#4A9EDB" filter="url(#dotglow)"/>

  <!-- Tokyo: lon=139.7, lat=35.7 -->
  <circle class="dot-ring" cx="888" cy="164" r="5" fill="none" stroke="#4A9EDB" stroke-width="1.2"/>
  <circle class="dot" cx="888" cy="164" r="5" fill="#4A9EDB" filter="url(#dotglow)"/>

  <!-- Singapore: lon=103.8, lat=1.3 -->
  <circle class="dot-ring" cx="789" cy="291" r="5" fill="none" stroke="#4A9EDB" stroke-width="1.2"/>
  <circle class="dot" cx="789" cy="291" r="5" fill="#4A9EDB" filter="url(#dotglow)"/>

</svg>
</body>
</html>
