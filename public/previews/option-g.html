<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Option G — Constellation Career Map</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #03050f; color: #e8e2d9; font-family: 'Inter', system-ui, sans-serif; overflow: hidden; height: 100vh; }

  nav {
    position: fixed; top: 0; left: 0; right: 0; height: 56px; z-index: 200;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2.5rem;
    background: rgba(3,5,15,0.8); backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .logo { font-size: 0.95rem; font-weight: 600; color: #e8e2d9; letter-spacing: 0.04em; }
  .nav-hint { font-size: 0.7rem; color: #3a3a5a; letter-spacing: 0.1em; text-transform: uppercase; }
  .nav-links { display: flex; gap: 1.5rem; list-style: none; }
  .nav-links a { color: #3a3a5a; font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none; transition: color 0.2s; }
  .nav-links a:hover { color: #c8a96e; }

  canvas { display: block; width: 100%; height: 100vh; cursor: crosshair; }

  /* INFO PANEL */
  .panel {
    position: fixed; right: 2rem; top: 50%; transform: translateY(-50%);
    width: 280px; background: rgba(3,5,15,0.92); border: 1px solid rgba(255,255,255,0.07);
    border-radius: 8px; padding: 1.75rem; backdrop-filter: blur(16px);
    transition: opacity 0.4s, transform 0.4s;
    opacity: 0; pointer-events: none;
    z-index: 100;
  }
  .panel.visible { opacity: 1; pointer-events: all; }
  .panel-tag { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: #c8a96e; margin-bottom: 0.5rem; }
  .panel h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.75rem; line-height: 1.2; }
  .panel p { font-size: 0.83rem; color: #7a7060; line-height: 1.7; }
  .panel-close { position: absolute; top: 0.75rem; right: 0.9rem; background: none; border: none; color: #3a3a5a; cursor: pointer; font-size: 1.1rem; padding: 0.2rem; transition: color 0.2s; }
  .panel-close:hover { color: #c8a96e; }
  .panel-years { font-size: 0.7rem; color: #5a5050; letter-spacing: 0.06em; margin-top: 0.75rem; border-top: 1px solid #1a1a2a; padding-top: 0.75rem; }

  /* INTRO */
  .intro {
    position: fixed; inset: 0; z-index: 300; background: #03050f;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; gap: 1rem; transition: opacity 1s;
  }
  .intro h1 { font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 700; letter-spacing: -0.03em; }
  .intro h1 span { color: #c8a96e; }
  .intro p { color: #4a4060; font-size: 0.9rem; letter-spacing: 0.06em; }
  .intro-btn {
    margin-top: 1rem; padding: 0.65rem 2rem; background: none;
    border: 1px solid #c8a96e; color: #c8a96e; font-size: 0.78rem;
    letter-spacing: 0.12em; text-transform: uppercase; border-radius: 3px;
    cursor: pointer; transition: background 0.2s, color 0.2s;
  }
  .intro-btn:hover { background: #c8a96e; color: #03050f; }

  .preview-badge {
    position: fixed; bottom: 1.5rem; right: 1.5rem;
    background: #c8a96e; color: #03050f; padding: 0.4rem 1rem;
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; border-radius: 20px; z-index: 999;
  }
  .back-bar {
    position: fixed; bottom: 1.5rem; left: 1.5rem;
    background: rgba(3,5,15,0.9); border: 1px solid #1a1a2a; color: #3a3a5a;
    padding: 0.4rem 1rem; font-size: 0.7rem; letter-spacing: 0.08em;
    border-radius: 20px; z-index: 999; text-decoration: none;
    text-transform: uppercase; transition: color 0.2s;
  }
  .back-bar:hover { color: #c8a96e; }
  .hint {
    position: fixed; bottom: 4.5rem; left: 50%; transform: translateX(-50%);
    font-size: 0.68rem; color: #2a2a3a; letter-spacing: 0.12em; text-transform: uppercase;
    pointer-events: none; z-index: 100;
    animation: fadeHint 3s ease 2s forwards;
  }
  @keyframes fadeHint { to { opacity: 0; } }
</style>
</head>
<body>

<a href="/previews/index.html" class="back-bar">← All Previews</a>
<div class="preview-badge">Option G — Constellation Map</div>

<div class="intro" id="intro">
  <p style="letter-spacing:0.2em;font-size:0.7rem;color:#4a4060;text-transform:uppercase;">Scott Seidel · Career Map</p>
  <h1>A life in<br><span>data & science</span></h1>
  <p>Explore an interactive map of 14 years across five domains</p>
  <button class="intro-btn" id="enterBtn">Enter the map →</button>
</div>

<nav>
  <span class="logo">Scott Seidel</span>
  <span class="nav-hint">Click any star cluster to explore</span>
  <ul class="nav-links">
    <li><a href="#">About</a></li>
    <li><a href="#">Musings</a></li>
  </ul>
</nav>

<canvas id="sky"></canvas>

<div class="panel" id="panel">
  <button class="panel-close" id="closePanel">✕</button>
  <p class="panel-tag" id="panel-tag"></p>
  <h2 id="panel-title"></h2>
  <p id="panel-desc"></p>
  <p class="panel-years" id="panel-years"></p>
</div>

<p class="hint">Hover · Click · Explore</p>

<script>
const canvas = document.getElementById('sky');
const ctx = canvas.getContext('2d');
let W, H, mouse = {x:-9999,y:-9999}, hoveredCluster = null, animFrame;

// Career clusters
const clusters = [
  {
    id: 'ai', label: 'AI Data', title: 'AI Training Data Collection',
    desc: 'Directing global AI training data collection programs at Soqono, serving industries including autonomous vehicles, AR/VR, biometrics, and computational photography.',
    years: '2022 — Present', color: '#c8a96e',
    cx: 0.28, cy: 0.42,
    stars: [
      {dx:0,dy:0,r:5},{dx:30,dy:-20,r:3},{dx:-25,dy:15,r:3.5},
      {dx:18,dy:30,r:2.5},{dx:-35,dy:-10,r:2},{dx:45,dy:10,r:2.5},
      {dx:10,dy:-40,r:2},{dx:-15,dy:35,r:2}
    ]
  },
  {
    id: 'av', label: 'Autonomy', title: 'Autonomous Vehicles',
    desc: 'Led VP-sponsored programs at Cruise critical to mitigating risks and resolving bottlenecks during the scaling of autonomous vehicle technology.',
    years: '2019 — 2022', color: '#7ab8f5',
    cx: 0.55, cy: 0.3,
    stars: [
      {dx:0,dy:0,r:5.5},{dx:-30,dy:-25,r:3},{dx:28,dy:-18,r:3.5},
      {dx:15,dy:28,r:2.5},{dx:-20,dy:20,r:2},{dx:40,dy:5,r:2}
    ]
  },
  {
    id: 'vr', label: 'AR/VR', title: 'AR/VR Development',
    desc: 'Led data collection and hardware validation studies for next-generation AR/VR products, producing data for SLAM, object recognition, eye tracking, and emotion classification.',
    years: '2016 — 2020', color: '#a87af5',
    cx: 0.72, cy: 0.55,
    stars: [
      {dx:0,dy:0,r:4.5},{dx:25,dy:-22,r:3},{dx:-28,dy:-15,r:2.5},
      {dx:10,dy:30,r:3},{dx:-15,dy:25,r:2},{dx:35,dy:15,r:2}
    ]
  },
  {
    id: 'bio', label: 'Biometrics', title: 'Biometric Algorithms',
    desc: 'Led programs developing facial and fingerprint recognition algorithms for next-generation Big Tech products, using ground-truth devices with globally diverse participant pools.',
    years: '2014 — 2018', color: '#f57a7a',
    cx: 0.42, cy: 0.68,
    stars: [
      {dx:0,dy:0,r:4},{dx:-22,dy:-18,r:2.5},{dx:25,dy:-10,r:3},
      {dx:12,dy:25,r:2.5},{dx:-30,dy:10,r:2}
    ]
  },
  {
    id: 'mat', label: 'Research', title: 'Materials Science Research',
    desc: 'Led a research team pioneering novel material processing methods for consumer electronics, biomedical, and aerospace applications. 12 peer-reviewed publications. 1 patent.',
    years: '2009 — 2014', color: '#7af5c8',
    cx: 0.2, cy: 0.65,
    stars: [
      {dx:0,dy:0,r:6},{dx:-35,dy:-20,r:3.5},{dx:30,dy:-25,r:3},
      {dx:-20,dy:28,r:2.5},{dx:35,dy:15,r:2.5},{dx:5,dy:-40,r:2},
      {dx:-45,dy:5,r:2}
    ]
  }
];

// Background starfield
let bgStars = [];
function initBg() {
  bgStars = [];
  for (let i = 0; i < 250; i++) {
    bgStars.push({
      x: Math.random(), y: Math.random(),
      r: Math.random() * 1.2 + 0.2,
      op: Math.random() * 0.5 + 0.05,
      twinkle: Math.random() * Math.PI * 2
    });
  }
}

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function getClusterPos(c) { return { x: c.cx * W, y: c.cy * H + 56 }; }

function getHovered(mx, my) {
  for (const c of clusters) {
    const {x, y} = getClusterPos(c);
    for (const s of c.stars) {
      const dx = mx - (x + s.dx), dy = my - (y + s.dy);
      if (Math.sqrt(dx*dx+dy*dy) < 28) return c;
    }
  }
  return null;
}

let t = 0;
function draw() {
  t += 0.008;
  ctx.clearRect(0, 0, W, H);

  // Deep space gradient
  const grad = ctx.createRadialGradient(W*0.5, H*0.45, 0, W*0.5, H*0.45, W*0.7);
  grad.addColorStop(0, '#07091a');
  grad.addColorStop(1, '#03050f');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // BG stars
  for (const s of bgStars) {
    s.twinkle += 0.012;
    const op = s.op + Math.sin(s.twinkle) * 0.08;
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(220,215,255,${Math.max(0,op)})`;
    ctx.fill();
  }

  // Constellation lines between clusters
  const pairs = [[0,1],[1,2],[0,3],[3,4],[0,4],[1,3]];
  for (const [a,b] of pairs) {
    const pa = getClusterPos(clusters[a]);
    const pb = getClusterPos(clusters[b]);
    const grad2 = ctx.createLinearGradient(pa.x, pa.y, pb.x, pb.y);
    grad2.addColorStop(0, clusters[a].color + '18');
    grad2.addColorStop(1, clusters[b].color + '18');
    ctx.beginPath();
    ctx.strokeStyle = grad2;
    ctx.lineWidth = 0.8;
    ctx.setLineDash([4, 8]);
    ctx.moveTo(pa.x, pa.y);
    ctx.lineTo(pb.x, pb.y);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Clusters
  for (const c of clusters) {
    const {x, y} = getClusterPos(c);
    const isHover = hoveredCluster === c;
    const pulse = Math.sin(t * 1.8 + c.cx * 10) * 0.3 + 0.7;

    // Stars in cluster
    for (const s of c.stars) {
      const sx = x + s.dx, sy = y + s.dy;
      const scale = isHover ? 1.5 : 1;

      // Glow
      if (s.dx === 0 && s.dy === 0) {
        const glow = ctx.createRadialGradient(sx, sy, 0, sx, sy, (s.r * scale + 8) * (isHover ? 2 : 1));
        glow.addColorStop(0, c.color + '60');
        glow.addColorStop(1, c.color + '00');
        ctx.beginPath();
        ctx.arc(sx, sy, (s.r + 12) * scale * (isHover ? 2 : 1), 0, Math.PI*2);
        ctx.fillStyle = glow;
        ctx.fill();
      }

      ctx.beginPath();
      ctx.arc(sx, sy, s.r * scale * (s.dx===0&&s.dy===0 ? pulse : 1), 0, Math.PI*2);
      ctx.fillStyle = isHover ? c.color : c.color + 'cc';
      ctx.fill();

      // Connecting lines inside cluster
      if (s.dx !== 0 || s.dy !== 0) {
        ctx.beginPath();
        ctx.strokeStyle = c.color + (isHover ? '50' : '28');
        ctx.lineWidth = 0.6;
        ctx.moveTo(x, y);
        ctx.lineTo(sx, sy);
        ctx.stroke();
      }
    }

    // Label
    ctx.font = `${isHover ? '600' : '500'} ${isHover ? '13px' : '11px'} Inter, system-ui, sans-serif`;
    ctx.fillStyle = isHover ? c.color : c.color + '90';
    ctx.textAlign = 'center';
    ctx.fillText(c.label.toUpperCase(), x, y + 52);

    // Sublabel on hover
    if (isHover) {
      ctx.font = '10px Inter, system-ui, sans-serif';
      ctx.fillStyle = '#ffffff40';
      ctx.fillText('click to explore', x, y + 68);
    }
  }

  animFrame = requestAnimationFrame(draw);
}

// Events
window.addEventListener('resize', () => { resize(); initBg(); });
canvas.addEventListener('mousemove', e => {
  mouse.x = e.clientX; mouse.y = e.clientY;
  hoveredCluster = getHovered(mouse.x, mouse.y);
  canvas.style.cursor = hoveredCluster ? 'pointer' : 'crosshair';
});

const panel = document.getElementById('panel');
canvas.addEventListener('click', e => {
  const c = getHovered(e.clientX, e.clientY);
  if (c) {
    document.getElementById('panel-tag').textContent = c.label;
    document.getElementById('panel-title').textContent = c.title;
    document.getElementById('panel-desc').textContent = c.desc;
    document.getElementById('panel-years').textContent = c.years;
    panel.classList.add('visible');
  }
});
document.getElementById('closePanel').addEventListener('click', () => panel.classList.remove('visible'));

// Intro
document.getElementById('enterBtn').addEventListener('click', () => {
  const intro = document.getElementById('intro');
  intro.style.opacity = '0';
  setTimeout(() => intro.style.display = 'none', 1000);
});

resize(); initBg(); draw();
</script>
</body>
</html>
